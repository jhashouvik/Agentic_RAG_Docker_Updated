version: "3.9"

# ── Local prototype: one container, everything included ────────
# Usage:
#   docker compose up --build
#   Open http://localhost:8501

services:
  pdf-qa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_qa_v2
    image: pdf-qa-langgraph:local

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/data
      # Override vector backend or embed model if needed:
      # - EMBED_MODEL=text-embedding-3-large
      # - FAISS_STORE_DIR=/data/faiss_store

    volumes:
      # FAISS index + SQLite memory persists across restarts
      - ./data:/data
      # Hot-reload during dev: mount source directly
      - ./agents:/app/agents
      - ./streamlit_app:/app/streamlit_app

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
